name: Release

on:
  push:
    tags:
      - "**"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build zip
        run: |
          mkdir -p dist/ActionBarStorage
          cp Core.lua Data.lua UI.lua ActionBarStorage.toc LICENSE CHANGELOG.md dist/ActionBarStorage/
          cd dist
          zip -r ActionBarStorage-${{ github.ref_name }}.zip ActionBarStorage/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ActionBarStorage-${{ github.ref_name }}.zip
          body_path: CHANGELOG.md

      - name: Upload to CurseForge
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          # Fetch available game versions and find WoW 12.0.x
          CF_VERSIONS=$(curl -s "https://wow.curseforge.com/api/game/versions" \
            -H "X-Api-Token: $CF_API_KEY")
          echo "Available versions containing '12.': $(echo "$CF_VERSIONS" | python3 -c "
import sys,json
data=json.load(sys.stdin)
[print(v) for v in data if '12.' in v.get('name','')]
" 2>/dev/null || echo 'parse error')"

          export GAME_VER_ID=$(echo "$CF_VERSIONS" | python3 -c "
import sys, json
data = json.load(sys.stdin)
match = next((v for v in data if '12.0' in v.get('name', '')), None)
print(match['id'] if match else 0)
")
          echo "Using game version ID: $GAME_VER_ID"

          # Write metadata to file — avoids all shell quoting / newline issues
          python3 -c "
import json, os
meta = {
    'changelog':     open('CHANGELOG.md').read(),
    'changelogType': 'markdown',
    'displayName':   os.environ['REF_NAME'],
    'gameVersions':  [int(os.environ['GAME_VER_ID'])],
    'releaseType':   'release'
}
open('/tmp/cf_meta.json', 'w').write(json.dumps(meta))
"
          # Upload — curl reads metadata from file; < is curl syntax, not a shell redirect
          RESPONSE=$(curl -s \
            -H "X-Api-Token: $CF_API_KEY" \
            -F "metadata=</tmp/cf_meta.json" \
            -F "file=@dist/ActionBarStorage-${REF_NAME}.zip" \
            "https://wow.curseforge.com/api/projects/1547500/upload-file")
          echo "CurseForge response: $RESPONSE"
