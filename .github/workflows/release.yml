name: Release

on:
  push:
    tags:
      - "**"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build zip
        run: |
          mkdir -p dist/ActionBarStorage
          cp Core.lua Data.lua UI.lua ActionBarStorage.toc LICENSE CHANGELOG.md dist/ActionBarStorage/
          cd dist && zip -r ActionBarStorage-${{ github.ref_name }}.zip ActionBarStorage/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ActionBarStorage-${{ github.ref_name }}.zip
          body_path: CHANGELOG.md

      - name: Upload to CurseForge
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
        run: python3 .github/upload_to_curseforge.py
